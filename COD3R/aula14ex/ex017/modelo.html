<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <header>
        <h1>Tabuada</h1>
    </header>
    <section>
        <div id="dados">
            <p>Número <input type="number" name="num" id="txtn"></p>
            <input class="botao" type="button" value="Gerar Tabuada" onclick="gerar()">
            <input class="botao" type="button" value="Recarregar" onclick="location.reload()">
        </div>
        <div id="res">
            <select name="tab" id="tab" size="10">
                <option value="">Digite um número acima</option>
            </select>
        </div>
    </section>
    <footer>
        <p>&copy; Curso em Vídeo</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
