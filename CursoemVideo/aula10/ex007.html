<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 10 - Somando Números</title>
    <style>
        body {
            font: normal 18pt Arial;
        }
        input {
            font: normal 18pt Arial;
            width: 100px;
        }
        div#res {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-flow: row wrap;

            background-color: green;
            color: white;

            width: 300px;
            height: 100px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="txt01" id="text01i">
    <input type="number" name="txt02" id="text02i">
    <input type="button" value="Somar" onclick="Somar()">
    <div id="res">
        RESULTADO
    </div>

    <script>
        function Somar() {
            var tn1 = window.document.getElementById('text01i')
            var tn2 = window.document.getElementById('text02i')
            var res = window.document.getElementById('res')
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var soma = n1 + n2
            res.innerHTML = `Somando os valores ${n1} e ${n2} temos ${soma}`
        }
    </script>

</body>
</html>
