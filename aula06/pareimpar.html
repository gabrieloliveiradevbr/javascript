<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 06 - Manipulação de dados</title>
</head>
<style>
    body {
        font: normal 20pt Arial;
        background-color: rgb(105, 105, 170);
        color: white;
    }

    h1 {
        border: 10px solid black;
        border-radius: 10px;
    }
</style>

<body>
    <script>
        var num = window.prompt("Digite o Número")
    </script>

    <h1>
        <script>
            function verificarNumero(num) {
                if (num == 0) {
                    return "O número é zero";
                } else if (num % 2 == 0) {
                    return "O número é par";
                } else {
                    return "O número é ímpar";
                }
            }

            document.writeln(verificarNumero(num))
        </script>
    </h1>
</body>
</html>
