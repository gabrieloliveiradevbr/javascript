<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 06 - Manipulação de dados</title>
    <style>
        body {
            background-color: rgb(105, 105, 170);
            color: white;
            font: normal 20pt Arial;
        }
        h1 {
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição.</p>
    <script>
        var n1 = Number(window.prompt("Digite um número: "))
        var n2 = Number(window.prompt("Digite outro número: "))
        var soma = n1 + n2
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${soma}`)

        //Number.parseInt(n1) converte para inteiro
        //Number.parseFloat(n1) converte para float
        //Number(n1) converte para float
        //n1.toString() converte para string
        //String(n1) converte para string
    </script>
</body>
</html>
