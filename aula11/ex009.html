<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 11 </title>
</head>

<body>
    <label for="pais">Escolha seu país:</label>
    <select name="pais" id="paisjs">
        <option value="Brasil">Brasil</option>
        <option value="Estrangeiro">Estrangeiro</option>
    </select>
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res">

    <script>
        function verificar() {
            var pais = document.getElementById('paisjs').value
            var display = document.getElementById('res')

            if (pais == 'Brasil') {
                display.innerHTML = `<p>Sua Nacionalidade é <strong>Brasileiro</strong></p>`
            } else {
                display.innerHTML = `<p>Sua Nacionalidade é <strong>Estrangeiro</strong></p>`
            }
        }
    </script>

</body>

</html>
