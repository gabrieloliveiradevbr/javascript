<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 10 - Eventos DOM</title>
    <style>
        div#area {
            font: normal 20pt Arial;
            width: 400px;
            height: 200px;
            background-color: rgb(68, 125, 199);
            color: white;
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>
    <script>
        var area = window.document.getElementById('area')

        area.addEventListener('click', clicar)
        area.addEventListener('mouseenter', passou)
        area.addEventListener('mouseleave', saiu)

        function clicar(){
            area.innerText = 'Clicou!'
            area.style.backgroundColor = 'red'
        }
        function passou(){
            area.innerText = 'Passou!'
            area.style.backgroundColor = 'green'
        }
        function saiu(){
            area.innerText = 'Mouse saiu'
            area.style.backgroundColor = 'yellow'
            area.style.color = 'black'
        }
        

        
        
    </script>
    
</body>
</html>
